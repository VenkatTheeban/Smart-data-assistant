services:
  - type: web
    name: smart-data-assistant
    runtime: python
    rootDir: Desktop/Praba/smart-data-assistant
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_PATH
        value: /var/data/assistant.db
      - key: DEBUG
        value: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
