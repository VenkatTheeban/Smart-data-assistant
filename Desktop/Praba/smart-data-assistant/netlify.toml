# After Railway deploys, update <RAILWAY_URL> below with your actual Railway backend URL
# Example: https://smart-data-assistant.railway.app

[[redirects]]
  from = "/api/*"
  to = "https://<RAILWAY_URL>/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
